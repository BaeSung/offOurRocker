appId: com.offourrocker.app
productName: Off Our Rocker
copyright: Copyright © 2026 BaeSung
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - package.json
  - node_modules/**/*
  - "!**/node_modules/*/{CHANGELOG.md,README.md,readme.md,*.markdown,.npmignore,.eslintrc*}"
  - "!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples,docs,doc}"
  - "!**/node_modules/*.d.ts"
  - "!**/node_modules/.bin"
asarUnpack:
  - "**/node_modules/better-sqlite3/**/*"
win:
  target:
    - target: appx
      arch: [x64]
    - target: nsis
      arch: [x64]
  icon: resources/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: "${productName}-Setup-${version}.${ext}"
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  icon: resources/icon.png
  hardenedRuntime: true
  gatekeeperAssess: false
  identity: null
dmg:
  artifactName: "${productName}-${version}-${arch}.${ext}"
appx:
  identityName: "offMyRocker.offOurRocker-koreanwritingapp"
  publisher: "CN=04523EE6-BC05-437D-ABA9-ECB4BFEFFF90"
  publisherDisplayName: "offMyRocker"
  applicationId: "OffOurRocker"
  displayName: "Off Our Rocker"
  languages:
    - ko-KR
publish:
  provider: github
  owner: BaeSung
  repo: offOurRocker
